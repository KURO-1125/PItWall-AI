services:
  - type: web
    name: pitwallai-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434
      - key: FASTF1_CACHE_DIR
        value: ./cache/fastf1
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_db
